<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0e15" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f8fa" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark light" />
    <meta name="description" content="Proj-Clarion — vertical-aware demo data generator. From prospect URL to live Grafana Cloud demo in minutes." />
    <meta property="og:title" content="Proj-Clarion · SE Console" />
    <meta property="og:description" content="Vertical-aware demo data generator for Grafana SE walkthroughs." />
    <meta property="og:type" content="website" />
    <title>Proj-Clarion · SE Console</title>
    <!--
      Theme bootstrap — set `data-theme` synchronously before React paints
      so we never flash dark→light (or vice versa). Reads localStorage,
      falls back to the OS preference. Must stay vanilla JS so it runs
      before the Vite bundle.

      Keep this in sync with ThemeProvider's `applyTheme` — both write to
      the same data-theme attribute and read the same `clarion.theme`
      localStorage key.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("clarion.theme") || "system";
          var resolved = stored;
          if (stored === "system") {
            resolved = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark" : "light";
          }
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (e) {
          // localStorage unavailable (private mode) — default to dark
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <!--
      Inline FOUC blocker — paint the matching canvas color before the JS
      bundle mounts so slow loads don't flash. The script above sets
      data-theme; this CSS reads that attribute.
    -->
    <style>
      html, body { margin: 0; }
      html[data-theme="dark"],  html[data-theme="dark"]  body { background: #0c0e15; color: #ecedf4; }
      html[data-theme="light"], html[data-theme="light"] body { background: #f7f8fa; color: #0f172a; }

      /* Skip-to-content link visible only when keyboard-focused —
         essential for screen-reader / keyboard users to bypass the
         persistent TopBar. Inlined so it works before React mounts. */
      .skip-link {
        position: fixed; top: -40px; left: 8px;
        background: #1c2030; color: #ecedf4;
        padding: 8px 12px; border-radius: 6px;
        text-decoration: none; font-size: 14px;
        z-index: 100; transition: top 0.15s;
      }
      .skip-link:focus { top: 8px; outline: 2px solid #a78bfa; }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
