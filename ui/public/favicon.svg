<!--
  Proj-Clarion mark.

  A clarion is a medieval trumpet — a "clarion call" announces something
  clearly and unmistakably. Proj-Clarion's job is to take a fuzzy
  prospect URL and broadcast a clean, customer-shaped demo into Grafana
  Cloud. The mark says "signal radiating from a source":

    • single origin dot (the prospect URL — the seed)
    • three arcs radiating outward (the broadcast — research, plan,
      live telemetry — three rings of clarity)
    • the arcs implicitly form a "C" when read left-to-right
    • doubles as a Wi-Fi/telemetry/heartbeat visual for observability

  Scales cleanly from 16×16 (browser tab) to 512×512 (app store / OG
  image) without losing the silhouette. Single-color so it inverts well
  on light backgrounds; the violet matches `--color-accent` and a Grafana
  orange highlight on the innermost arc subtly ties it to the platform.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- subtle gradient halo so it pops on the dark canvas -->
  <defs>
    <radialGradient id="halo" cx="35%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#a78bfa" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glow halo -->
  <circle cx="11" cy="16" r="14" fill="url(#halo)"/>

  <!-- Origin dot (the source) -->
  <circle cx="10" cy="16" r="2.4" fill="#a78bfa"/>

  <!-- Arc 1 — innermost, brightest. Grafana orange accent so the mark
       reads as "powered by Grafana" without screaming it. -->
  <path d="M 13.5 12.6 A 4 4 0 0 1 13.5 19.4"
        stroke="#FF8833" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Arc 2 — middle ring -->
  <path d="M 17 9.2 A 8 8 0 0 1 17 22.8"
        stroke="#a78bfa" stroke-width="2.2" stroke-linecap="round" fill="none"
        opacity="0.78"/>

  <!-- Arc 3 — outermost, faintest -->
  <path d="M 20.5 5.8 A 12 12 0 0 1 20.5 26.2"
        stroke="#a78bfa" stroke-width="2.2" stroke-linecap="round" fill="none"
        opacity="0.42"/>
</svg>
